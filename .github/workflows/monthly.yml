name: Monthly Conference Check

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scrape.js
      - name: Commit results
        run: |
          git config user.name "Conference Tracker"
          git config user.email "actions@github.com"
          git add raw-data.json
          git diff --cached --quiet || git commit -m "Update raw data"
          git push
